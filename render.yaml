databases:
  - name: tracer-db
    databaseName: tracer
    user: tracer
    plan: free

services:
  - type: web
    name: tracer-api
    runtime: node
    plan: free
    branch: main
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npx prisma migrate deploy && node dist/server.js
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: tracer-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: FRONTEND_URL
        sync: false
